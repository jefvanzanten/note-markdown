# Cargo configuration for Android builds

[build]
# Enable incremental compilation for faster builds
incremental = true

# Android-specific settings
[target.aarch64-linux-android]
linker = "aarch64-linux-android-clang"

[target.armv7-linux-androideabi]
linker = "armv7a-linux-androideabi-clang"

[target.i686-linux-android]
linker = "i686-linux-android-clang"

[target.x86_64-linux-android]
linker = "x86_64-linux-android-clang"

# Profile optimizations
[profile.dev]
# Keep incremental compilation enabled for debug builds
incremental = true
# Slightly reduce debug info to speed up compilation
debug = 1

[profile.release]
# Optimize for size and speed
opt-level = "z"
lto = true
codegen-units = 1
strip = true
